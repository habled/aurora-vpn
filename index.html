<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F1EFEA">
    <title>Aurora — Debug</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap">

    <style>
        :root {
            --paper:    #F1EFEA;
            --ink:      #1B1A16;
            --muted:    #8C8578;
            --hairline: rgba(27, 26, 22, 0.12);
            --accent:   #7D8E81;
            --error:    #B85842;
            --ok:       #5E7A5E;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--paper);
            color: var(--ink);
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 32px 24px;
        }

        .stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        .eyebrow {
            font-family: 'Geist Mono', ui-monospace, monospace;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .eyebrow .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            vertical-align: middle;
            margin: 0 10px 2px;
        }

        h1.title {
            font-family: 'Instrument Serif', Georgia, serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(40px, 10vw, 56px);
            line-height: 1.05;
            letter-spacing: -0.01em;
            margin-bottom: 16px;
        }

        .tagline {
            font-family: 'Instrument Serif', Georgia, serif;
            font-style: italic;
            font-size: 18px;
            color: var(--muted);
            margin-bottom: 40px;
        }

        .description {
            font-size: 14px;
            line-height: 1.7;
            color: var(--muted);
            max-width: 320px;
            margin: 0 auto 32px;
        }

        .cta {
            appearance: none;
            border: none;
            background: var(--ink);
            color: var(--paper);
            font-family: 'Geist Mono', ui-monospace, monospace;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            padding: 18px 44px;
            border-radius: 999px;
            cursor: pointer;
            min-width: 240px;
        }

        .cta:active { transform: scale(0.98); }
        .cta[disabled] { opacity: 0.5; cursor: progress; }

        /* DEBUG console — only visible on this debug version */
        .debug-log {
            margin-top: 40px;
            width: 100%;
            max-width: 480px;
            background: rgba(0,0,0,0.04);
            border: 1px solid var(--hairline);
            border-radius: 8px;
            padding: 14px 16px;
            font-family: 'Geist Mono', ui-monospace, monospace;
            font-size: 11px;
            line-height: 1.55;
            text-align: left;
            color: var(--ink);
            min-height: 80px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .debug-log .line { display: block; }
        .debug-log .line.ok    { color: var(--ok); }
        .debug-log .line.err   { color: var(--error); }
        .debug-log .line.info  { color: var(--muted); }
    </style>
</head>
<body>

    <main class="stage">
        <div class="eyebrow">Aurora <span class="dot"></span> Debug Mode</div>
        <h1 class="title">Диагностика</h1>
        <p class="tagline">— проверяем sendData —</p>
        <p class="description">
            Нажми кнопку и наблюдай за журналом ниже.
            Все этапы покажутся прямо на экране.
        </p>
        <button class="cta" id="get-code-button" type="button">Получить код</button>

        <div class="debug-log" id="debug-log"></div>
    </main>

    <script>
        const logEl = document.getElementById('debug-log');

        function log(text, level) {
            const line = document.createElement('span');
            line.className = 'line ' + (level || 'info');
            const stamp = new Date().toLocaleTimeString();
            line.textContent = '[' + stamp + '] ' + text;
            logEl.appendChild(line);
        }

        // Catch any unhandled JS error and show it
        window.addEventListener('error', function (e) {
            log('JS error: ' + (e.message || e) + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'), 'err');
        });

        log('Page loaded', 'info');

        const tg = window.Telegram && window.Telegram.WebApp;

        if (!tg) {
            log('window.Telegram.WebApp is MISSING — script not loaded?', 'err');
        } else {
            log('Telegram.WebApp object found', 'ok');
            try {
                tg.ready();
                log('tg.ready() called', 'ok');
            } catch (e) {
                log('tg.ready() error: ' + e.message, 'err');
            }
            try {
                tg.expand();
                log('tg.expand() called', 'ok');
            } catch (e) {
                log('tg.expand() error: ' + e.message, 'err');
            }
            log('Platform: ' + (tg.platform || 'unknown'), 'info');
            log('Version: ' + (tg.version || 'unknown'), 'info');
            log('initData length: ' + ((tg.initData || '').length), 'info');
        }

        const button = document.getElementById('get-code-button');

        button.addEventListener('click', function () {
            log('Button clicked', 'info');

            if (!tg) {
                log('Cannot send: no Telegram.WebApp', 'err');
                return;
            }
            if (typeof tg.sendData !== 'function') {
                log('Cannot send: tg.sendData is not a function', 'err');
                return;
            }

            button.disabled = true;
            button.textContent = 'Отправляем…';

            try {
                const payload = JSON.stringify({ action: 'request_code' });
                log('Calling tg.sendData("' + payload + '")', 'info');
                tg.sendData(payload);
                log('tg.sendData() returned without error', 'ok');
            } catch (e) {
                log('tg.sendData() threw: ' + (e.message || e), 'err');
                button.disabled = false;
                button.textContent = 'Получить код';
                return;
            }

            log('NOT closing WebApp — please close manually with the X button', 'info');
               button.disabled = false;
               button.textContent = 'Закрыть и получить ответ';
        });
    </script>
</body>
</html>
