services:
  - type: web
    name: aurora-vpn-bot
    runtime: python
    plan: free
    region: frankfurt           # closest EU region; change if you prefer
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false             # you'll paste this in the Render dashboard
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: PUBLIC_URL
        sync: false             # set this to your Render URL once it's known
      - key: CORS_ORIGIN
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true     # Render will generate a strong random value
      - key: LOG_LEVEL
        value: INFO
